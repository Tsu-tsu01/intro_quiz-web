<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イントロクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#141420;--card:#1c1c2e;--green:#1db954;--green2:#17a347;--red:#ff0000;--red2:#cc0000;--accent:#9b59b6;--gold:#ffd700;--wrong:#e74c3c;--correct:#2ecc71;--text:#eeeeee;--sub:#888899;--border:#2a2a3e;--p1:#3498db;--p2:#e91e63}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,rgba(255,0,0,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(155,89,182,.06) 0%,transparent 50%)}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes waveAnim{0%,100%{height:12px;opacity:.5}50%{height:48px;opacity:1}}
.fade-in{animation:fadeIn .3s ease}

/* SERVICE & HOME */
#screen-service{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;gap:20px}
.svc-title{font-size:32px;font-weight:700;letter-spacing:4px;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:slideUp .4s .1s both}
.svc-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%}
.svc-card{padding:32px 16px;border-radius:24px;border:2px solid var(--border);background:var(--card);cursor:pointer;text-align:center;transition:all .3s cubic-bezier(.175,.885,.32,1.275)}
.svc-card:hover{transform:translateY(-8px);border-color:var(--red);box-shadow:0 12px 32px rgba(255,0,0,.2)}
.svc-icon{font-size:48px;margin-bottom:12px}
.svc-name{font-size:16px;font-weight:700}
.svc-desc{font-size:11px;color:var(--sub);margin-top:6px}

#screen-home{flex:1;display:flex;flex-direction:column;padding:24px 20px}
.home-hdr{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.home-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,#ff0000,#cc0000);box-shadow:0 4px 12px rgba(255,0,0,.3)}
.home-ttl{font-size:22px;font-weight:700;flex:1;letter-spacing:1px}
.btn-sm{background:var(--surface);border:1px solid var(--border);color:var(--sub);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:12px;transition:all .2s;font-weight:700}
.btn-sm:hover{border-color:var(--text);color:var(--text);background:var(--card)}
.sec-lbl{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:2px;text-transform:uppercase;margin:24px 0 12px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mode-card{display:flex;flex-direction:column;gap:4px;padding:16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s}
.mode-card.sel{background:linear-gradient(135deg,#ff0000,#cc0000);border-color:transparent;box-shadow:0 6px 20px rgba(255,0,0,0.3)}
.mode-card.sel .mode-name,.mode-card.sel .mode-desc{color:#fff}
.mode-emoji{font-size:24px}.mode-name{font-size:15px;font-weight:700;color:var(--text)}
.mode-desc{font-size:10px;color:var(--sub)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:10px 20px;border-radius:24px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.chip.sel{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 4px 12px rgba(255,0,0,.2)}
.btn-start{margin-top:auto;width:100%;padding:20px;border:none;border-radius:36px;font-size:18px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff;box-shadow:0 8px 24px rgba(255,0,0,.3);transition:all .2s}
.btn-start:hover{transform:scale(1.02);opacity:.95}

/* PLAYLIST */
#screen-playlist{flex:1;display:flex;flex-direction:column}
.scr-hdr{display:flex;align-items:center;gap:12px;padding:16px 20px}
.scr-ttl{font-size:18px;font-weight:700;flex:1}
.pl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px;overflow-y:auto;flex:1}
.pl-card{border-radius:20px;overflow:hidden;cursor:pointer;border:1.5px solid var(--border);background:linear-gradient(135deg,#1c1c30,#141422);transition:all .2s}
.pl-card:hover{transform:translateY(-4px);border-color:var(--red);box-shadow:0 8px 24px rgba(255,0,0,.2)}
.pl-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface)}
.pl-info{padding:12px}.pl-name{font-size:14px;font-weight:700;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* QUIZ */
#screen-quiz{flex:1;display:flex;flex-direction:column;padding:12px 16px}
#yt-player{position:fixed;top:-10px;left:-10px;width:1px;height:1px;opacity:0.01;pointer-events:none}
.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.quiz-prog{flex:1}
.q-lbl{font-size:13px;font-weight:700;margin-bottom:4px;color:var(--sub)}
.prog-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--red);transition:width .3s ease;box-shadow:0 0 8px var(--red)}
.q-score-solo{padding:6px 16px;border-radius:14px;font-weight:700;font-size:16px;background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff;box-shadow:0 4px 12px rgba(255,0,0,.3)}

.vs-score-row{display:flex;justify-content:space-between;gap:10px;margin-top:8px}
.p-score-box{flex:1;padding:6px 12px;border-radius:12px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;border:1.5px solid transparent}
.p-score-box.p1{background:rgba(52,152,219,0.1);border-color:rgba(52,152,219,0.3);color:var(--p1)}
.p-score-box.p2{background:rgba(233,30,99,0.1);border-color:rgba(233,30,99,0.3);color:var(--p2)}

.timer-wrap{display:flex;align-items:center;justify-content:center;margin:20px 0}
.timer-cont{position:relative;display:flex;align-items:center;justify-content:center;width:200px;height:200px}
.timer-svg{width:200px;height:200px;position:absolute}
.timer-circle-bg{stroke:var(--border);stroke-width:6}
.timer-circle-fg{stroke:var(--red);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 80ms linear}

.central-content{width:150px;height:150px;border-radius:50%;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.wave-container{display:flex;align-items:center;gap:6px;height:60px}
.wave-bar{width:8px;border-radius:4px;background:var(--red);animation:waveAnim 1s ease-in-out infinite;box-shadow:0 0 10px rgba(255,0,0,.5)}
.wave-bar:nth-child(2),.wave-bar:nth-child(4){animation-delay:.15s}.wave-bar:nth-child(3){animation-delay:.3s}
.q-album-art{width:100%;height:100%;object-fit:cover;position:absolute;animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1)}

.pts-lbl{text-align:center;font-size:22px;font-weight:700;color:var(--gold);height:30px;text-shadow:0 0 12px rgba(255,215,0,.4)}
.trk-info{text-align:center;margin:6px 0;min-height:44px}
.trk-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trk-artist{font-size:12px;color:var(--sub)}

.choices{display:flex;flex-direction:column;gap:10px;flex:1;justify-content:center}
.choice-btn{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:18px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;text-align:left;position:relative}
.choice-btn:hover:not(.ans){transform:translateX(4px);border-color:var(--sub);background:rgba(255,255,255,0.04)}
.choice-btn.mode-2p-active{cursor:default}
.choice-btn.ans{cursor:default}
.choice-btn.correct{background:rgba(46,204,113,0.15);border-color:var(--correct);box-shadow:0 0 16px rgba(46,204,113,0.2)}
.choice-btn.wrong{background:rgba(231,76,60,0.12);border-color:var(--wrong)}
.choice-btn.missed{background:rgba(255,215,0,0.1);border-color:var(--gold)}
.c-lbl{width:32px;height:32px;border-radius:10px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--red);flex-shrink:0;box-shadow:inset 0 0 8px rgba(0,0,0,.3)}
.c-txt{flex:1;min-width:0}
.c-track{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-artist{font-size:12px;color:var(--sub)}

.p-ind-wrap{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;gap:6px}
.p-ind{width:10px;height:10px;border-radius:50%;display:none;box-shadow:0 0 8px rgba(0,0,0,0.5)}
.p-ind.p1-sel{display:block;background:var(--p1);box-shadow:0 0 8px var(--p1)}
.p-ind.p2-sel{display:block;background:var(--p2);box-shadow:0 0 8px var(--p2)}

/* RESULT */
#screen-result{flex:1;display:flex;flex-direction:column;padding:32px 24px;overflow-y:auto}
.res-card{background:linear-gradient(135deg,#1c1c30,#141422);border:1.5px solid var(--border);border-radius:24px;padding:24px;margin:24px 0;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.res-score-row{display:flex;justify-content:center;gap:40px;align-items:center}
.res-score-val{font-size:52px;font-weight:700;color:var(--red);line-height:1}
.res-score-val.p1{color:var(--p1)}.res-score-val.p2{color:var(--p2)}
.res-lbl{font-size:12px;color:var(--sub);margin-top:6px;font-weight:700;letter-spacing:1px}
.btn-act{width:100%;padding:18px;border:none;border-radius:32px;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:12px;background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff;box-shadow:0 6px 20px rgba(255,0,0,.3)}

/* MODAL */
.dlg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px;backdrop-filter:blur(6px)}
.dlg{background:var(--card);border-radius:24px;padding:32px;max-width:400px;width:100%;border:1.5px solid var(--border);animation:scaleIn .3s ease}
.btn-dlg{padding:12px 24px;border-radius:14px;border:none;font-size:15px;font-weight:700;cursor:pointer;background:var(--red);color:#fff;box-shadow:0 4px 12px rgba(255,0,0,0.2)}
</style>
</head>
<body>
<div id="app">

<!-- SERVICE -->
<div id="screen-service">
  <div class="svc-title">🎵 イントロクイズ</div>
  <div class="svc-cards">
    <div class="svc-card sp" style="opacity:0.4; cursor:not-allowed;" onclick="showDlg('開発凍結','YouTube Music版をご利用ください。')">
      <div class="svc-icon">🟢</div><div class="svc-name">Spotify</div><div class="svc-desc">開発凍結</div>
    </div>
    <div class="svc-card yt" onclick="chooseSvc('youtube')">
      <div class="svc-icon">🔴</div><div class="svc-name">YouTube Music</div><div class="svc-desc">無料でOK</div>
    </div>
  </div>
</div>

<!-- YT SETUP -->
<div id="screen-yt-setup" class="hidden" style="padding:48px 32px">
  <button class="btn-sm" onclick="showOnly('service')">← サービス選択へ</button>
  <h2 style="margin:24px 0 12px; font-size:24px">🔴 YouTube Music 設定</h2>
  <p style="font-size:13px; color:var(--sub); margin-bottom:24px; line-height:1.6">Google Cloud Consoleで作成した認証情報を入力してください。</p>
  <input class="setup-inp" id="yt-cid" type="text" placeholder="クライアントID" style="width:100%; padding:14px; background:var(--card); border:1.5px solid var(--border); border-radius:12px; color:#fff; margin-bottom:12px">
  <input class="setup-inp" id="yt-cs" type="password" placeholder="クライアントシークレット" style="width:100%; padding:14px; background:var(--card); border:1.5px solid var(--border); border-radius:12px; color:#fff">
  <div style="font-size:11px; color:var(--sub); margin:16px 0;">リダイレクトURI:<br><code id="yt-redir" style="color:var(--accent)"></code></div>
  <button class="btn-start" onclick="startYtSetup()">ログインする</button>
</div>

<!-- HOME -->
<div id="screen-home" class="hidden">
  <div class="home-hdr">
    <div class="home-icon">🔴</div><div class="home-ttl">イントロクイズ</div>
    <button class="btn-sm" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="sec-lbl">モード選択</div>
  <div class="mode-grid">
    <div class="mode-card" id="mode-10" onclick="selMode('10')"><div class="mode-emoji">🎵</div><div class="mode-name">10問</div><div class="mode-desc">1人プレイ</div></div>
    <div class="mode-card" id="mode-25" onclick="selMode('25')"><div class="mode-emoji">🎸</div><div class="mode-name">25問</div><div class="mode-desc">1人プレイ</div></div>
    <div class="mode-card" id="mode-endless" onclick="selMode('endless')"><div class="mode-emoji">♾️</div><div class="mode-name">エンドレス</div><div class="mode-desc">ライフ3つ</div></div>
    <div class="mode-card" id="mode-2p" onclick="selMode('2p')"><div class="mode-emoji">⚔️</div><div class="mode-name">2人対戦</div><div class="mode-desc">キーボードバトル</div></div>
  </div>
  <div class="sec-lbl">イントロの長さ</div>
  <div class="chips"><button class="chip" onclick="selIntro(3)">3s</button><button class="chip" onclick="selIntro(5)">5s</button><button class="chip sel" onclick="selIntro(10)">10s</button><button class="chip" onclick="selIntro(30)">30s</button></div>
  <div class="sec-lbl">URLで遊ぶ</div>
  <div style="display:flex; gap:8px; margin-bottom:12px">
    <input type="text" id="custom-url" placeholder="YouTubeプレイリストURL" style="flex:1; background:var(--card); border:1.5px solid var(--border); border-radius:12px; padding:12px; color:#fff; font-size:14px">
    <button class="btn-sm" style="background:var(--red); border:none; color:#fff; padding:0 16px" onclick="loadCustomUrl()">開始</button>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:32px">
    <button class="btn-sm" onclick="setCustomUrl('https://youtube.com/playlist?list=PLVbDD4bH3SU5KEVHCK2UvH_k2Fz9HlgBh')">アイマス</button>
    <button class="btn-sm" onclick="setCustomUrl('https://youtube.com/playlist?list=PLggd500bJ4DhP4DfC_lYVDWPdq74xmJN9')">ミリオン</button>
    <button class="btn-sm" onclick="setCustomUrl('https://youtube.com/playlist?list=PLggd500bJ4Dj-EmsNzgZfLsSAWVhiMDuI')">シャニ</button>
  </div>
  <button class="btn-start" onclick="showOnly('playlist'); loadPl();">自分のリストから選ぶ ▶</button>
</div>

<!-- PLAYLIST -->
<div id="screen-playlist" class="hidden">
  <div class="scr-hdr"><button class="btn-sm" onclick="showHome()">← 戻る</button><div class="scr-ttl">プレイリスト選択</div></div>
  <div id="pl-body" style="flex:1; overflow-y:auto; padding-bottom:40px"></div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="hidden">
  <div id="yt-player"></div>
  <div class="quiz-top">
    <button class="btn-quit" onclick="confirmQuit()" style="font-size:24px">✕</button>
    <div class="quiz-prog">
      <div class="q-lbl" id="q-lbl">1 / 10</div>
      <div class="prog-wrap"><div class="prog-fill" id="q-bar"></div></div>
      <div class="vs-score-row" id="vs-score-row">
        <div class="p-score-box p1"><span>P1</span><span id="p1-score">0</span></div>
        <div class="p-score-box p2"><span>P2</span><span id="p2-score">0</span></div>
      </div>
    </div>
    <div class="q-score-solo" id="solo-score">0</div>
  </div>
  
  <div class="timer-wrap">
    <div class="timer-cont">
      <svg class="timer-svg" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="90" fill="none" class="timer-circle-bg"/>
        <circle id="timer-ring" cx="100" cy="100" r="90" fill="none" class="timer-circle-fg" stroke-dasharray="565" stroke-dashoffset="0" transform="rotate(-90 100 100)"/>
      </svg>
      <div class="central-content">
        <div id="q-load-msg" style="font-size:13px; color:var(--sub); font-weight:700">読み込み中...</div>
        <div class="wave-container hidden" id="wave-anim">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
        <img id="q-album-art" class="q-album-art hidden" src="">
      </div>
    </div>
  </div>
  
  <div class="pts-lbl" id="pts-lbl">&nbsp;</div>
  <div class="trk-info" id="trk-info" style="opacity:0"><div class="trk-name" id="trk-name"></div><div class="trk-artist" id="trk-artist"></div></div>
  <div class="choices" id="choices"></div>
  <div style="text-align:center; font-size:11px; color:var(--border); margin-top:12px; font-weight:700" id="hint-txt">1-4キー回答 / Sスキップ</div>
</div>

<!-- RESULT -->
<div id="screen-result" class="hidden">
  <div style="text-align:center"><div style="font-size:72px; animation: scaleIn .5s cubic-bezier(.34,1.56,.64,1)">🎉</div><div id="res-rank" style="font-size:28px; font-weight:700; letter-spacing:2px; margin-top:8px">RESULT</div></div>
  <div class="res-card">
    <div class="res-score-row">
      <div style="text-align:center">
        <div class="res-score-val" id="res-p1">0</div><div class="res-lbl">P1 SCORE</div>
      </div>
      <div style="text-align:center" id="res-p2-box">
        <div class="res-score-val p2" id="res-p2">0</div><div class="res-lbl">P2 SCORE</div>
      </div>
    </div>
  </div>
  <button class="btn-act" onclick="showHome()">🏠 ホームへ戻る</button>
</div>

</div>

<div id="dlg" class="dlg-overlay hidden">
  <div class="dlg">
    <div id="dlg-title" style="font-size:20px; font-weight:700; margin-bottom:16px"></div>
    <div id="dlg-body" style="font-size:14px; color:var(--sub); margin-bottom:28px; line-height:1.6; white-space:pre-wrap"></div>
    <div id="dlg-acts" style="text-align:right"><button class="btn-dlg" onclick="document.getElementById('dlg').classList.add('hidden')">OK</button></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// CONFIG
const YT_TOK_URL='https://oauth2.googleapis.com/token',YT_API='https://www.googleapis.com/youtube/v3',REDIR=location.origin+location.pathname;
let gameMode='10',introSec=10,allTracks=[],usedIds=new Set(),curPl=null;
let qNum=0,score1=0,score2=0,correct=null,choices=[],answered=false,qStart=null,tick=null,nextTimer=null;
let p1Sel=null,p2Sel=null,p1Time=0,p2Time=0;
let ytPlayer=null,ytReady=false,ytPlayingCb=null;

// YT PLAYER
function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('yt-player',{height:'1',width:'1',playerVars:{autoplay:0,controls:0,origin:window.location.origin,playsinline:1},
    events:{onReady:()=>{ytReady=true;},onStateChange:e=>{if(e.data===1&&ytPlayingCb){ytPlayingCb();ytPlayingCb=null;}},
      onError:()=>{if(answered)return;clearTimers();setupQ();}}});
}
function ytPlay(id){if(ytReady&&ytPlayer){ytPlayer.loadVideoById(id,0);ytPlayer.playVideo();}}
function ytPause(){try{if(ytPlayer)ytPlayer.pauseVideo();}catch(e){}}

// AUTH
function b64u(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function pkce(){const v=b64u(crypto.getRandomValues(new Uint8Array(64))),h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));return{v,c:b64u(h)};}
function showOnly(id){['service','yt-setup','home','playlist','quiz','result'].forEach(s=>document.getElementById('screen-'+s).classList.toggle('hidden',s!==id));}
function showHome(){showOnly('home');selMode(gameMode);}
function chooseSvc(s){if(s!=='youtube')return;const t=localStorage.getItem('yt_tok'),e=parseInt(localStorage.getItem('yt_exp')||'0');if(t&&Date.now()<e)showHome();else showOnly('yt-setup');document.getElementById('yt-redir').textContent=REDIR;}
async function startYtSetup(){
  const cid=document.getElementById('yt-cid').value.trim(),cs=document.getElementById('yt-cs').value.trim();
  if(!cid||!cs){alert('IDとシークレットが必要です');return;}
  localStorage.setItem('yt_cid',cid); localStorage.setItem('yt_cs',cs);
  const{v,c}=await pkce(); localStorage.setItem('yt_v',v);
  const u=`https://accounts.google.com/o/oauth2/v2/auth?response_type=code&client_id=${cid}&redirect_uri=${encodeURIComponent(REDIR)}&scope=https://www.googleapis.com/auth/youtube.readonly&access_type=offline&prompt=consent&code_challenge=${c}&code_challenge_method=S256`;
  location.href=u;
}
async function getYtTok(){
  const exp=parseInt(localStorage.getItem('yt_exp')||'0');
  if(Date.now()>exp-300000){
    const ref=localStorage.getItem('yt_ref'),cid=localStorage.getItem('yt_cid'),cs=localStorage.getItem('yt_cs');
    const r=await fetch(YT_TOK_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:ref,client_id:cid,client_secret:cs})});
    const d=await r.json(); localStorage.setItem('yt_tok',d.access_token); localStorage.setItem('yt_exp',Date.now()+(d.expires_in||3600)*1000); return d.access_token;
  }
  return localStorage.getItem('yt_tok');
}
function doLogout(){localStorage.removeItem('yt_tok');showOnly('service');}

// HOME
function selMode(m){gameMode=m;document.querySelectorAll('.mode-card').forEach(el=>el.classList.toggle('sel',el.id.replace('mode-','')===m));}
function selIntro(s){introSec=s;document.querySelectorAll('.chip').forEach(el=>el.classList.toggle('sel',parseInt(el.textContent)===s));}
function setCustomUrl(url){document.getElementById('custom-url').value=url;}
async function loadCustomUrl(){
  const u=document.getElementById('custom-url').value.trim(); if(!u)return;
  let id=u.match(/[?&]list=([^&]+)/)?.[1]||u; startQuiz({id,name:"Custom List"});
}
async function loadPl(){
  const b=document.getElementById('pl-body'); b.innerHTML='<div style="padding:60px;text-align:center;font-weight:700;color:var(--sub)">読み込み中...</div>';
  const tok=await getYtTok();
  const r=await fetch(`${YT_API}/playlists?part=snippet&mine=true&maxResults=50`,{headers:{Authorization:`Bearer ${tok}`}});
  const d=await r.json(); b.innerHTML=''; const g=document.createElement('div'); g.className='pl-grid';
  (d.items||[]).forEach(i=>{
    const c=document.createElement('div'); c.className='pl-card fade-in';
    c.innerHTML=`<img class="pl-img" src="${i.snippet.thumbnails.medium.url}"><div class="pl-info"><div class="pl-name">${esc(i.snippet.title)}</div></div>`;
    c.onclick=()=>startQuiz({id:i.id,name:i.snippet.title}); g.appendChild(c);
  });
  b.appendChild(g);
}

// QUIZ LOGIC
async function startQuiz(pl){
  curPl=pl; showOnly('quiz'); qNum=0; score1=0; score2=0; usedIds.clear();
  const isVs=gameMode==='2p';
  document.getElementById('vs-score-row').classList.toggle('hidden',!isVs);
  document.getElementById('solo-score').classList.toggle('hidden',isVs);
  document.getElementById('choices').classList.toggle('mode-2p-active',isVs);
  document.getElementById('hint-txt').textContent = isVs ? "P1: 1-4キー / P2: 7-0キー" : "1-4キー回答 / Sスキップ";
  
  const tok=await getYtTok();
  const r=await fetch(`${YT_API}/playlistItems?part=snippet&playlistId=${pl.id}&maxResults=100`,{headers:{Authorization:`Bearer ${tok}`}});
  const d=await r.json();
  allTracks=d.items.map(i=>({id:i.snippet.resourceId.videoId,name:i.snippet.title,artist:i.snippet.videoOwnerChannelTitle,img:i.snippet.thumbnails.medium.url}));
  setupQ();
}

async function setupQ(){
  const lim=(gameMode==='2p'?10:(gameMode==='endless'?999:parseInt(gameMode)));
  if(qNum>=lim){endQuiz();return;}
  clearTimers(); answered=false; qStart=null; p1Sel=null; p2Sel=null;
  correct=allTracks[Math.floor(Math.random()*allTracks.length)];
  choices=[correct,...allTracks.filter(t=>t.id!==correct.id).sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5);
  
  // UI初期化
  document.getElementById('q-lbl').textContent=`${qNum+1}問目`;
  document.getElementById('pts-lbl').innerHTML='&nbsp;';
  document.getElementById('trk-info').style.opacity='0';
  document.getElementById('q-load-msg').classList.remove('hidden');
  document.getElementById('wave-anim').classList.add('hidden');
  document.getElementById('q-album-art').classList.add('hidden');
  document.getElementById('timer-ring').style.strokeDashoffset=0;
  document.getElementById('q-bar').style.width = (qNum/lim*100) + '%';
  
  const el=document.getElementById('choices'); el.innerHTML='';
  choices.forEach((t,i)=>{
    const b=document.createElement('button'); b.className='choice-btn';
    if(gameMode==='2p') b.classList.add('mode-2p-active');
    b.innerHTML=`<div class="c-lbl">${i+1}</div><div class="c-txt"><div class="c-track">${esc(t.name)}</div><div class="c-artist">${esc(t.artist)}</div></div><div class="p-ind-wrap"><div class="p-ind" id="p1-i-${i}"></div><div class="p-ind" id="p2-i-${i}"></div></div>`;
    if(gameMode!=='2p') b.onclick=()=>onAns(0,i);
    el.appendChild(b);
  });

  ytPlay(correct.id);
  await new Promise(r=>{ytPlayingCb=r; setTimeout(r,8000);});
  
  document.getElementById('q-load-msg').classList.add('hidden');
  document.getElementById('wave-anim').classList.remove('hidden');
  qStart=Date.now(); startTick();
  pauseT=setTimeout(()=>{if(!answered)timeUp();},introSec*1000);
}

function startTick(){tick=setInterval(()=>{const p=Math.max(0,1-(Date.now()-qStart)/(introSec*1000));document.getElementById('timer-ring').style.strokeDashoffset=565*(1-p);},80);}

function onAns(pIdx, cIdx){
  if(answered||!qStart)return;
  const time=Date.now()-qStart;
  if(pIdx===0 && p1Sel===null){p1Sel=choices[cIdx]; p1Time=time; const i=document.getElementById(`p1-i-${cIdx}`); if(i)i.classList.add('p1-sel');}
  if(pIdx===1 && p2Sel===null){p2Sel=choices[cIdx]; p2Time=time; const i=document.getElementById(`p2-i-${cIdx}`); if(i)i.classList.add('p2-sel');}
  if(gameMode!=='2p' || (p1Sel!==null && p2Sel!==null)){clearTimers(); answered=true; reveal();}
}

function timeUp(){clearTimers(); answered=true; reveal();}

function reveal(){
  ytPause();
  const ok1=(p1Sel?.id===correct.id), ok2=(p2Sel?.id===correct.id);
  if(ok1) score1+=Math.floor(100*(1-p1Time/(introSec*1000))+50);
  if(gameMode==='2p'&&ok2) score2+=Math.floor(100*(1-p2Time/(introSec*1000))+50);
  
  document.getElementById('solo-score').textContent=score1;
  document.getElementById('p1-score').textContent=score1;
  document.getElementById('p2-score').textContent=score2;
  document.getElementById('trk-name').textContent=correct.name;
  document.getElementById('trk-artist').textContent=correct.artist;
  document.getElementById('trk-info').style.opacity='1';
  document.getElementById('wave-anim').classList.add('hidden');
  document.getElementById('q-album-art').src=correct.img;
  document.getElementById('q-album-art').classList.remove('hidden');
  
  Array.from(document.getElementById('choices').children).forEach((b,i)=>{
    b.classList.add('ans');
    if(choices[i].id===correct.id) b.classList.add('correct');
    else if(p1Sel?.id===choices[i].id || p2Sel?.id===choices[i].id) b.classList.add('wrong');
    if(choices[i].id===correct.id && !ok1 && (gameMode!=='2p'||!ok2)) b.classList.add('missed');
  });
  qNum++; nextTimer=setTimeout(setupQ,3000);
}

function endQuiz(){
  showOnly('result');
  document.getElementById('res-p1').textContent=score1;
  document.getElementById('res-p2-box').classList.toggle('hidden',gameMode!=='2p');
  if(gameMode==='2p'){
    document.getElementById('res-p2').textContent=score2;
    document.getElementById('res-rank').textContent=score1>score2?"P1 WIN!":(score2>score1?"P2 WIN!":"DRAW");
  } else document.getElementById('res-rank').textContent="FINISH!";
}

function clearTimers(){clearInterval(tick);clearTimeout(nextTimer);clearTimeout(pauseT);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function confirmQuit(){clearTimers();ytPause();showHome();}
function showDlg(t,b){document.getElementById('dlg-title').textContent=t;document.getElementById('dlg-body').textContent=b;document.getElementById('dlg').classList.remove('hidden');}

document.addEventListener('keydown',e=>{
  if(document.getElementById('screen-quiz').classList.contains('hidden')||answered)return;
  if(['1','2','3','4'].includes(e.key)) onAns(0,parseInt(e.key)-1);
  if(['7','8','9','0'].includes(e.key)){const idx=e.key==='0'?3:parseInt(e.key)-7; if(idx>=0&&idx<=3)onAns(1,idx);}
  if(e.key.toLowerCase()==='s')timeUp();
});

(async()=>{
  const p=new URLSearchParams(location.search),c=p.get('code');
  if(c){
    const v=localStorage.getItem('yt_v'),cid=localStorage.getItem('yt_cid'),cs=localStorage.getItem('yt_cs');
    const r=await fetch(YT_TOK_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code:c,redirect_uri:REDIR,client_id:cid,client_secret:cs,code_verifier:v})});
    const d=await r.json(); localStorage.setItem('yt_tok',d.access_token); localStorage.setItem('yt_ref',d.refresh_token||''); localStorage.setItem('yt_exp',Date.now()+(d.expires_in||3600)*1000);
    history.replaceState({},'',location.pathname);
  }
  const tok=localStorage.getItem('yt_tok'),exp=parseInt(localStorage.getItem('yt_exp')||'0');
  if(tok&&Date.now()<exp){chooseSvc('youtube');}else showOnly('service');
})();
</script>
