<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>イントロクイズ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#141420;--card:#1c1c2e;--green:#1db954;--green2:#17a347;--red:#ff0000;--red2:#cc0000;--accent:#9b59b6;--gold:#ffd700;--wrong:#e74c3c;--correct:#2ecc71;--text:#eeeeee;--sub:#888899;--border:#2a2a3e;--p1:#3498db;--p2:#e91e63}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,rgba(29,185,84,.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(155,89,182,.05) 0%,transparent 50%)}
#app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hidden{display:none!important}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn .3s ease}

/* SERVICE */
#screen-service{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;gap:20px}
.svc-title{font-size:30px;font-weight:700;letter-spacing:2px;animation:slideUp .4s .1s both}
.svc-sub{color:var(--sub);font-size:13px;animation:slideUp .4s .2s both}
.svc-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;animation:slideUp .4s .3s both}
.svc-card{padding:28px 16px;border-radius:20px;border:2px solid var(--border);background:var(--card);cursor:pointer;text-align:center;transition:all .2s;user-select:none}
.svc-card:hover{transform:translateY(-4px)}
.svc-card.yt:hover{border-color:var(--red);box-shadow:0 8px 24px rgba(255,0,0,.25)}
.svc-icon{font-size:44px;margin-bottom:10px}
.svc-name{font-size:15px;font-weight:700}
.svc-desc{font-size:11px;color:var(--sub);margin-top:4px}

/* YT SETUP */
#screen-yt-setup{flex:1;display:flex;flex-direction:column;padding:20px 24px;overflow-y:auto}
.back-btn{background:none;border:none;color:var(--sub);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:8px;align-self:flex-start;margin-bottom:16px}
.setup-h{font-size:20px;font-weight:700;margin-bottom:6px}
.setup-inp{width:100%;margin-top:8px;padding:10px 12px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit}
.setup-inp:focus{outline:none;border-color:var(--red)}
.btn-yt-go{width:100%;padding:16px;border:none;border-radius:32px;background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px;font-family:inherit;transition:opacity .2s}
.btn-yt-go:hover{opacity:.85}

/* HOME */
#screen-home{flex:1;display:flex;flex-direction:column;padding:24px 20px}
.home-hdr{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.home-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,#ff0000,#cc0000)}
.home-ttl{font-size:20px;font-weight:700;flex:1}
.home-acts{display:flex;gap:8px}
.btn-sm{background:none;border:1px solid var(--border);color:var(--sub);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.btn-sm:hover{border-color:var(--sub);color:var(--text)}
.sec-lbl{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.mode-card{display:flex;flex-direction:column;gap:4px;padding:14px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;user-select:none}
.mode-card.sel{background:linear-gradient(135deg,#ff0000,#cc0000);border-color:transparent;box-shadow:0 4px 20px rgba(255,0,0,0.25)}
.mode-card.sel .mode-name,.mode-card.sel .mode-desc{color:#fff}
.mode-emoji{font-size:22px}.mode-name{font-size:14px;font-weight:700;color:var(--text)}
.mode-desc{font-size:10px;color:var(--sub)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px}
.chip{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;font-family:inherit}
.chip.sel{background:var(--red);border-color:var(--red);color:#fff}
.chip:hover:not(.sel){border-color:var(--sub)}
.btn-start{margin-top:auto;width:100%;padding:18px;border:none;border-radius:32px;font-size:17px;font-weight:700;cursor:pointer;transition:opacity .2s;font-family:inherit;background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff}
.btn-start:hover{opacity:.85}

/* PLAYLIST */
#screen-playlist{flex:1;display:flex;flex-direction:column}
.scr-hdr{display:flex;align-items:center;gap:8px;padding:12px 16px 8px}
.btn-back{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .15s}
.btn-back:hover{background:var(--surface)}
.scr-ttl{font-size:17px;font-weight:700;flex:1}
.pl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;overflow-y:auto;flex:1}
.pl-card{border-radius:16px;overflow:hidden;cursor:pointer;border:1.5px solid var(--border);background:linear-gradient(135deg,#1c1c30,#141422);transition:all .15s}
.pl-card:hover{transform:translateY(-3px);border-color:var(--red);box-shadow:0 8px 24px rgba(255,0,0,0.15)}
.pl-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface)}
.pl-info{padding:10px}.pl-name{font-size:13px;font-weight:700;color:var(--text)}

/* QUIZ */
#screen-quiz{flex:1;display:flex;flex-direction:column;padding:12px 16px}
#yt-player{position:fixed;top:0;left:0;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-10}
.quiz-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.btn-quit{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:4px;border-radius:6px}
.quiz-prog{flex:1}
.q-lbl{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.prog-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s ease;background:var(--red)}
.score-row{display:flex;justify-content:space-between;gap:10px;margin-top:4px}
.p-score{flex:1;padding:4px 12px;border-radius:12px;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.p-score.p1{background:rgba(52,152,219,0.15);border:1px solid var(--p1);color:var(--p1)}
.p-score.p2{background:rgba(233,30,99,0.15);border:1px solid var(--p2);color:var(--p2)}
.timer-wrap{display:flex;align-items:center;justify-content:center;margin:16px 0}
.timer-cont{position:relative;display:flex;align-items:center;justify-content:center}
.timer-svg{width:180px;height:180px}
.visualizer-canvas{position:absolute;width:140px;height:140px;border-radius:50%;background:rgba(0,0,0,0.2)}
.album-art{width:140px;height:140px;border-radius:50%;object-fit:cover;position:absolute;animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 32px rgba(255,0,0,0.3)}
.album-ph{width:140px;height:140px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:48px;position:absolute}
.pts-lbl{text-align:center;font-size:20px;font-weight:700;color:var(--gold);height:28px}
.trk-info{text-align:center;margin:4px 0;min-height:40px;animation:fadeIn .3s ease}
.trk-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trk-artist{font-size:12px;color:var(--sub)}
.choices{display:flex;flex-direction:column;gap:8px;flex:1;justify-content:center}
.choice-btn{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;text-align:left;position:relative;overflow:hidden}
/* 2Pモードの時はマウス操作を無効化 */
.mode-2p-active .choice-btn { cursor: not-allowed; }
.choice-btn.correct{background:rgba(46,204,113,0.15);border-color:var(--correct)}
.choice-btn.wrong{background:rgba(231,76,60,0.1);border-color:var(--wrong)}
.choice-btn.missed{background:rgba(255,215,0,0.1);border-color:var(--gold)}
.c-lbl{width:28px;height:28px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:var(--red)}
.c-track{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-artist{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-indicator{position:absolute;bottom:4px;right:6px;display:flex;gap:4px}
.p-ind{width:8px;height:8px;border-radius:50%;display:none}
.p-ind.p1{background:var(--p1);display:block}
.p-ind.p2{background:var(--p2);display:block}

/* RESULT */
#screen-result{flex:1;display:flex;flex-direction:column;padding:24px;overflow-y:auto}
.res-card{background:linear-gradient(135deg,#1c1c30,#141422);border:1px solid var(--border);border-radius:20px;padding:20px;margin:20px 0}
.res-score-row{display:flex;justify-content:center;gap:30px;align-items:center;margin-bottom:20px}
.res-score-val{font-size:40px;font-weight:700}
.res-score-val.p1{color:var(--p1)}.res-score-val.p2{color:var(--p2)}
.btn-act{width:100%;padding:15px;border:none;border-radius:28px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:inherit;background:linear-gradient(135deg,#ff0000,#cc0000);color:#fff}

/* DIALOG */
.dlg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px;backdrop-filter:blur(4px)}
.dlg{background:var(--card);border-radius:20px;padding:24px;max-width:380px;width:100%;border:1px solid var(--border)}
.btn-dlg{padding:8px 16px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;background:var(--red);color:#fff}
</style>
</head>
<body>
<div id="app">

<!-- SERVICE -->
<div id="screen-service">
  <div class="svc-title">🎵 イントロクイズ</div>
  <div class="svc-sub">サービスを選んでください</div>
  <div class="svc-cards">
    <div class="svc-card sp" style="opacity:0.5; filter:grayscale(0.8); cursor:not-allowed;" onclick="showDlg('開発凍結','YouTube Music版をご利用ください。',[{l:'閉じる',a:()=>{}}])">
      <div class="svc-icon">🟢</div>
      <div class="svc-name">Spotify</div>
      <div class="svc-desc">開発凍結</div>
    </div>
    <div class="svc-card yt" onclick="chooseSvc('youtube')">
      <div class="svc-icon">🔴</div>
      <div class="svc-name">YouTube Music</div>
      <div class="svc-desc">無料でOK</div>
    </div>
  </div>
</div>

<!-- YT SETUP -->
<div id="screen-yt-setup" class="hidden">
  <button class="back-btn" onclick="showOnly('service')">←</button>
  <div class="setup-h">🔴 YouTube Music 設定</div>
  <div class="setup-inp-wrap">
    <input class="setup-inp" id="yt-cid" type="text" placeholder="クライアントID">
    <input class="setup-inp" id="yt-cs" type="password" placeholder="クライアントシークレット" style="margin-top:6px">
    <div style="font-size:11px; color:var(--sub); margin-top:10px;">リダイレクトURI:<br><code id="yt-redir"></code></div>
  </div>
  <button class="btn-yt-go" onclick="startYtSetup()">ログイン →</button>
</div>

<!-- HOME -->
<div id="screen-home" class="hidden">
  <div class="home-hdr">
    <div class="home-icon">🔴</div>
    <div class="home-ttl">イントロクイズ</div>
    <div class="home-acts"><button class="btn-sm" onclick="doLogout()">ログアウト</button></div>
  </div>
  <div class="sec-lbl">モード選択</div>
  <div class="mode-grid">
    <div class="mode-card" id="mode-10" onclick="selMode('10')"><div class="mode-emoji">🎵</div><div class="mode-name">10問</div><div class="mode-desc">1人プレイ</div></div>
    <div class="mode-card" id="mode-25" onclick="selMode('25')"><div class="mode-emoji">🎸</div><div class="mode-name">25問</div><div class="mode-desc">1人プレイ</div></div>
    <div class="mode-card" id="mode-endless" onclick="selMode('endless')"><div class="mode-emoji">♾️</div><div class="mode-name">エンドレス</div><div class="mode-desc">1人プレイ</div></div>
    <div class="mode-card" id="mode-2p" onclick="selMode('2p')"><div class="mode-emoji">⚔️</div><div class="mode-name">2人対戦</div><div class="mode-desc">キーボードバトル</div></div>
  </div>
  <div id="yt-url-section">
    <div class="sec-lbl" style="margin-top:20px">URLで遊ぶ</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input type="text" id="custom-url" class="setup-inp" style="margin-top:0;flex:1" placeholder="YouTubeプレイリストURL">
      <button class="btn-sm" style="background:var(--red);color:#fff;border:none;padding:0 16px;font-weight:700" onclick="loadCustomUrl()">開始</button>
    </div>
    <div style="font-size:10px;color:var(--sub);display:flex;gap:4px;flex-wrap:wrap;">
      <button class="btn-sm" onclick="setCustomUrl('https://youtube.com/playlist?list=PLVbDD4bH3SU5KEVHCK2UvH_k2Fz9HlgBh')">アイマス</button>
      <button class="btn-sm" onclick="setCustomUrl('https://youtube.com/playlist?list=PLggd500bJ4DhP4DfC_lYVDWPdq74xmJN9')">ミリオン</button>
      <button class="btn-sm" onclick="setCustomUrl('https://youtube.com/playlist?list=PLggd500bJ4Dj-EmsNzgZfLsSAWVhiMDuI')">シャニ</button>
    </div>
  </div>
  <button class="btn-start" onclick="goPlaylist()">プレイリストから選ぶ ▶</button>
</div>

<!-- PLAYLIST -->
<div id="screen-playlist" class="hidden">
  <div class="scr-hdr"><button class="btn-back" onclick="showHome()">←</button><div class="scr-ttl">プレイリスト選択</div></div>
  <div id="pl-body" style="flex:1;overflow-y:auto"></div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="hidden">
  <div id="yt-player"></div>
  <div class="quiz-top">
    <button class="btn-quit" onclick="confirmQuit()">✕</button>
    <div class="quiz-prog">
      <div class="q-lbl" id="q-lbl">1 / 10</div>
      <div class="prog-wrap"><div class="prog-fill" id="q-bar"></div></div>
      <div class="score-row">
        <div id="p1-score-box" class="p-score p1"><span>P1</span><span id="p1-score-val">0</span></div>
        <div id="p2-score-box" class="p-score p2 hidden"><span>P2</span><span id="p2-score-val">0</span></div>
      </div>
    </div>
  </div>
  <div class="timer-wrap">
    <div class="timer-cont">
      <svg class="timer-svg" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="88" fill="none" stroke="var(--border)" stroke-width="6"/>
        <circle id="timer-ring" cx="100" cy="100" r="88" fill="none" stroke="var(--red)" stroke-width="6" stroke-linecap="round" stroke-dasharray="553" stroke-dashoffset="0" transform="rotate(-90 100 100)" style="transition:stroke-dashoffset 80ms linear"/>
      </svg>
      <canvas id="visualizer" class="visualizer-canvas"></canvas>
      <div id="load-msg" style="position:absolute; font-size:12px; color:var(--sub)">読み込み中...</div>
      <img id="album-art" class="album-art hidden" src="" alt="">
      <div id="album-ph" class="album-ph hidden">🎵</div>
    </div>
  </div>
  <div class="pts-lbl" id="pts-lbl">&nbsp;</div>
  <div class="trk-info" id="trk-info" style="opacity:0"><div class="trk-name" id="trk-name"></div><div class="trk-artist" id="trk-artist"></div></div>
  <div class="choices" id="choices"></div>
  <div class="key-hint" id="key-hint">1-4回答 / Sスキップ</div>
</div>

<!-- RESULT -->
<div id="screen-result" class="hidden">
  <div style="text-align:center"><div class="res-emoji">🎉</div><div id="res-rank" class="res-rank">RESULT</div></div>
  <div class="res-card">
    <div class="res-score-row">
      <div class="res-score-item"><div class="res-score-val p1" id="res-p1-val">0</div><div class="res-lbl">P1 SCORE</div></div>
      <div class="res-score-item" id="res-p2-item"><div class="res-score-val p2" id="res-p2-val">0</div><div class="res-lbl">P2 SCORE</div></div>
    </div>
  </div>
  <div id="res-rev"></div>
  <button class="btn-act" onclick="showHome()">🏠 ホームへ戻る</button>
</div>

</div>

<div id="dlg" class="dlg-overlay hidden">
  <div class="dlg"><div id="dlg-title" class="dlg-title"></div><div id="dlg-body" class="dlg-body"></div><div id="dlg-acts" class="dlg-acts"></div></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// CONFIG & STATE
const YT_AUTH='https://accounts.google.com/o/oauth2/v2/auth',YT_TOK='https://oauth2.googleapis.com/token',YT_API='https://www.googleapis.com/youtube/v3',YT_SCOPE='https://www.googleapis.com/auth/youtube.readonly',REDIR=location.origin+location.pathname;
let svc='youtube',gameMode='10',introSec=10,allTracks=[],usedIds=new Set(),curPl=null;
let qNum=0,results=[],correct=null,choices=[],answered=false,qStart=null,tick=null,nextTimer=null;
let ytPlayer=null,ytReady=false,ytPlayingCb=null,visAnim=null;
let p1={score:0,sel:null,time:0}, p2={score:0,sel:null,time:0};

// YT PLAYER
function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('yt-player',{height:'200',width:'200',playerVars:{autoplay:0,controls:0,origin:window.location.origin,playsinline:1},
    events:{onReady:()=>{ytReady=true;},onStateChange:(e)=>{if(e.data===1&&ytPlayingCb){ytPlayingCb();ytPlayingCb=null;}},
      onError:()=>{if(answered)return; clearTimers(); ytPause(); setupQ();}}});
}
function ytPlay(vid){if(ytReady&&ytPlayer){ytPlayer.loadVideoById(vid,0);ytPlayer.playVideo();}}
function ytPause(){try{if(ytPlayer&&ytReady)ytPlayer.pauseVideo();}catch(_){}}

// VISUALIZER
function initVisualizer(){
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  const bars = 20; let frame = 0;
  canvas.width = 140; canvas.height = 140;
  function draw(){
    if(document.getElementById('screen-quiz').classList.contains('hidden')){cancelAnimationFrame(visAnim);return;}
    ctx.clearRect(0,0,140,140);
    const playing = (qStart && !answered); frame++;
    for(let i=0; i<bars; i++){
      const h = playing ? (Math.sin(frame*0.15 + i*0.5) * 20 + 25 + Math.random()*15) : 5;
      const x = (140/bars)*i + 2; const w = (140/bars) - 4;
      const grad = ctx.createLinearGradient(0, 70-h/2, 0, 70+h/2);
      grad.addColorStop(0, '#ff0000'); grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad; ctx.fillRect(x, 70 - h/2, w, h);
    }
    visAnim = requestAnimationFrame(draw);
  }
  if(visAnim) cancelAnimationFrame(visAnim);
  draw();
}

// PKCE & AUTH
function b64u(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');}
async function pkce(){const v=b64u(crypto.getRandomValues(new Uint8Array(64)));const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));return{v,c:b64u(h)};}
function showOnly(id){['service','yt-setup','home','playlist','quiz','result'].forEach(s=>document.getElementById('screen-'+s).classList.toggle('hidden',s!==id));}
function showHome(){showOnly('home'); selMode(gameMode);}
function chooseSvc(s){if(s==='spotify')return; svc=s; document.getElementById('yt-redir').textContent=REDIR; const tok=localStorage.getItem('yt_tok'),exp=parseInt(localStorage.getItem('yt_exp')||'0'); if(tok&&Date.now()<exp){showHome();}else{showOnly('yt-setup');}}
async function startYtSetup(){
  const cid=document.getElementById('yt-cid').value.trim(),cs=document.getElementById('yt-cs').value.trim();
  if(!cid||!cs){alert('IDとシークレットを入力してください');return;}
  localStorage.setItem('yt_cid',cid); localStorage.setItem('yt_cs',cs);
  const{v,c}=await pkce(); localStorage.setItem('yt_v',v); localStorage.setItem('pending','youtube');
  const u=new URL(YT_AUTH); u.searchParams.set('response_type','code'); u.searchParams.set('client_id',cid); u.searchParams.set('redirect_uri',REDIR); u.searchParams.set('scope',YT_SCOPE); u.searchParams.set('access_type','offline'); u.searchParams.set('prompt','consent'); u.searchParams.set('code_challenge_method','S256'); u.searchParams.set('code_challenge',c);
  location.href=u;
}
async function getYtTok(){
  const exp=parseInt(localStorage.getItem('yt_exp')||'0');
  if(Date.now()>exp-300000){
    const ref=localStorage.getItem('yt_ref'),cid=localStorage.getItem('yt_cid'),cs=localStorage.getItem('yt_cs');
    const r=await fetch(YT_TOK,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'refresh_token',refresh_token:ref,client_id:cid,client_secret:cs})});
    const d=await r.json(); localStorage.setItem('yt_tok',d.access_token); localStorage.setItem('yt_exp',Date.now()+(d.expires_in||3600)*1000); return d.access_token;
  }
  return localStorage.getItem('yt_tok');
}
function doLogout(){localStorage.removeItem('yt_tok');showOnly('service');}

// HOME & PLAYLIST
function selMode(m){gameMode=m; document.querySelectorAll('.mode-card').forEach(el=>el.classList.toggle('sel',el.id.replace('mode-','')===m));}
function setCustomUrl(url){document.getElementById('custom-url').value=url;}
async function loadCustomUrl(){
  const urlStr=document.getElementById('custom-url').value.trim(); if(!urlStr)return;
  let plId=urlStr.match(/[?&]list=([^&]+)/)?.[1]||urlStr;
  startQuiz({id:plId, name:"カスタムプレイリスト"});
}
function goPlaylist(){showOnly('playlist');loadPl();}
async function loadPl(){
  const body=document.getElementById('pl-body'); body.innerHTML='<div style="padding:40px;text-align:center">読み込み中...</div>';
  const tok=await getYtTok();
  const r=await fetch(`${YT_API}/playlists?part=snippet&mine=true&maxResults=50`,{headers:{Authorization:`Bearer ${tok}`}});
  const d=await r.json(); body.innerHTML=''; const g=document.createElement('div'); g.className='pl-grid';
  (d.items||[]).forEach(i=>{
    const c=document.createElement('div'); c.className='pl-card fade-in';
    c.innerHTML=`<img class="pl-img" src="${i.snippet.thumbnails.medium.url}"><div class="pl-info"><div class="pl-name">${esc(i.snippet.title)}</div></div>`;
    c.onclick=()=>startQuiz({id:i.id, name:i.snippet.title}); g.appendChild(c);
  });
  body.appendChild(g);
}

// QUIZ LOGIC
async function startQuiz(pl){
  curPl=pl; showOnly('quiz'); results=[]; qNum=0; p1.score=0; p2.score=0;
  document.getElementById('p2-score-box').classList.toggle('hidden', gameMode!=='2p');
  document.getElementById('key-hint').textContent = gameMode==='2p' ? "P1: 1-4 / P2: 7-0" : "1-4キー回答 / Sスキップ";
  // 2Pモードならクラスを付与してマウス無効化
  document.getElementById('choices').classList.toggle('mode-2p-active', gameMode==='2p');

  const tok=await getYtTok();
  const r=await fetch(`${YT_API}/playlistItems?part=snippet&playlistId=${pl.id}&maxResults=100`,{headers:{Authorization:`Bearer ${tok}`}});
  const d=await r.json();
  allTracks = d.items.map(it=>({id:it.snippet.resourceId.videoId, name:it.snippet.title, artist:it.snippet.videoOwnerChannelTitle, img:it.snippet.thumbnails.medium.url, videoId:it.snippet.resourceId.videoId}));
  usedIds=new Set(); setupQ(); initVisualizer();
}

async function setupQ(){
  const lim = gameMode==='2p' ? 10 : (gameMode==='endless' ? 999 : parseInt(gameMode));
  if(qNum >= lim) {endQuiz(); return;}
  clearTimers(); answered=false; qStart=null; p1.sel=null; p2.sel=null;
  
  correct=allTracks[Math.floor(Math.random()*allTracks.length)];
  choices=[correct, ...allTracks.filter(t=>t.id!==correct.id).sort(()=>Math.random()-.5).slice(0,3)].sort(()=>Math.random()-.5);
  
  // UI初期化
  document.getElementById('q-lbl').textContent = `${qNum+1}問目`;
  document.getElementById('pts-lbl').innerHTML='&nbsp;';
  document.getElementById('trk-info').style.opacity='0';
  document.getElementById('load-msg').classList.remove('hidden');
  document.getElementById('album-art').classList.add('hidden');
  setRing(1);
  
  const el=document.getElementById('choices'); el.innerHTML='';
  choices.forEach((t,i)=>{
    const b=document.createElement('button'); b.className='choice-btn'; b.id=`c${i}`;
    b.innerHTML=`<div class="c-lbl">${i+1}</div><div class="c-txt"><div class="c-track">${esc(t.name)}</div><div class="c-artist">${esc(t.artist)}</div></div><div class="p-indicator"><div class="p-ind p1" id="p1-ind-${i}"></div><div class="p-ind p2" id="p2-ind-${i}"></div></div>`;
    // 2Pモード以外ならクリックを有効にする
    if(gameMode !== '2p') {
      b.onclick=()=>onAns(0, i);
    } else {
      b.onclick=null;
    }
    el.appendChild(b);
  });

  // 再生開始
  ytPlay(correct.videoId);
  await new Promise(r=>{ytPlayingCb=r; setTimeout(r, 8000);});
  document.getElementById('load-msg').classList.add('hidden');
  qStart=Date.now(); startTick();
  pauseT=setTimeout(()=>{ if(!answered) timeUp(); }, introSec*1000);
}

function startTick(){const tot=introSec*1000; tick=setInterval(()=>{const p=Math.max(0,1-(Date.now()-qStart)/tot); setRing(p); if(p<=0) clearInterval(tick);},80);}
function setRing(p){const r=document.getElementById('timer-ring'); r.style.strokeDashoffset=553*(1-p);}

function onAns(pIdx, choiceIdx){
  if(answered || !qStart) return;
  const time = Date.now() - qStart;
  if(pIdx===0 && p1.sel===null){ p1.sel=choices[choiceIdx]; p1.time=time; document.getElementById(`p1-ind-${choiceIdx}`).style.display='block'; }
  if(pIdx===1 && p2.sel===null){ p2.sel=choices[choiceIdx]; p2.time=time; document.getElementById(`p2-ind-${choiceIdx}`).style.display='block'; }
  
  if(gameMode!=='2p' || (p1.sel!==null && p2.sel!==null)) {
    clearTimers(); answered=true; reveal();
  }
}

function timeUp(){ clearTimers(); answered=true; reveal(); }

function reveal(){
  ytPause();
  const ok1 = p1.sel?.id === correct.id; const ok2 = p2.sel?.id === correct.id;
  if(ok1) p1.score += Math.floor(100 * (1 - p1.time/(introSec*1000)) + 50);
  if(gameMode==='2p' && ok2) p2.score += Math.floor(100 * (1 - p2.time/(introSec*1000)) + 50);
  
  document.getElementById('p1-score-val').textContent = p1.score;
  document.getElementById('p2-score-val').textContent = p2.score;
  document.getElementById('trk-name').textContent = correct.name;
  document.getElementById('trk-artist').textContent = correct.artist;
  document.getElementById('trk-info').style.opacity='1';
  document.getElementById('album-art').src = correct.img;
  document.getElementById('album-art').classList.remove('hidden');
  
  choices.forEach((t,i)=>{
    const b=document.getElementById(`c${i}`); b.classList.add('ans');
    if(t.id===correct.id) b.classList.add('correct');
    else {
      if(p1.sel?.id===t.id || (gameMode==='2p' && p2.sel?.id===t.id)) b.classList.add('wrong');
    }
    // もし誰も正解せず時間切れなら
    if(t.id===correct.id && !ok1 && (!ok2 && gameMode==='2p')) b.classList.add('missed');
  });
  
  qNum++; nextTimer=setTimeout(setupQ, 3000);
}

function endQuiz(){
  showOnly('result');
  document.getElementById('res-p1-val').textContent = p1.score;
  document.getElementById('res-p2-item').classList.toggle('hidden', gameMode!=='2p');
  if(gameMode==='2p'){
    document.getElementById('res-p2-val').textContent = p2.score;
    document.getElementById('res-rank').textContent = p1.score > p2.score ? "P1 WIN!" : (p2.score > p1.score ? "P2 WIN!" : "DRAW");
  } else {
    document.getElementById('res-rank').textContent = "FINISH!";
  }
}

function clearTimers(){clearInterval(tick); clearTimeout(nextTimer); clearTimeout(pauseT);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function confirmQuit(){clearTimers(); ytPause(); showHome();}
function showDlg(t,b,a){document.getElementById('dlg-title').textContent=t;document.getElementById('dlg-body').textContent=b;const acts=document.getElementById('dlg-acts');acts.innerHTML='';a.forEach(btn=>{const el=document.createElement('button');el.className='btn-dlg';el.textContent=btn.l;el.onclick=()=>{document.getElementById('dlg').classList.add('hidden');btn.a();};acts.appendChild(el);});document.getElementById('dlg').classList.remove('hidden');}

// KEYBOARD
document.addEventListener('keydown',e=>{
  if(document.getElementById('screen-quiz').classList.contains('hidden')||answered)return;
  if(['1','2','3','4'].includes(e.key)) onAns(0, parseInt(e.key)-1);
  if(['7','8','9','0'].includes(e.key)) {
    const idx = e.key==='0'?3:parseInt(e.key)-7;
    if(idx>=0 && idx<=3) onAns(1, idx);
  }
  if(e.key.toLowerCase()==='s') timeUp();
});

// INIT
(async()=>{
  const p=new URLSearchParams(location.search),code=p.get('code');
  if(code){
    const v=localStorage.getItem('yt_v'),cid=localStorage.getItem('yt_cid'),cs=localStorage.getItem('yt_cs');
    const r=await fetch(YT_TOK,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,redirect_uri:REDIR,client_id:cid,client_secret:cs,code_verifier:v})});
    const d=await r.json();
    localStorage.setItem('yt_tok',d.access_token); localStorage.setItem('yt_ref',d.refresh_token||''); localStorage.setItem('yt_exp',Date.now()+(d.expires_in||3600)*1000);
    history.replaceState({},'',location.pathname);
  }
  const tok=localStorage.getItem('yt_tok'),exp=parseInt(localStorage.getItem('yt_exp')||'0');
  if(tok&&Date.now()<exp){svc='youtube'; showHome();} else {showOnly('service');}
})();
</script>
